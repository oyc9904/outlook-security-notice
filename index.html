<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oops</title>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-0YD6XPCJFM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-0YD6XPCJFM');
  </script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      font-family: 'Segoe UI', sans-serif;
    }

    .container {
      text-align: center;
      padding: 40px 24px;
    }

    .emoji {
      font-size: 80px;
      display: block;
      margin-bottom: 28px;
      animation: bounce 0.6s ease infinite alternate;
    }

    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-12px); }
    }

    h1 {
      font-size: 32px;
      font-weight: 800;
      color: #1059cf;
      margin-bottom: 14px;
    }

    p {
      font-size: 17px;
      color: #e38a2b;
      line-height: 1.6;
      max-width: 400px;
      margin: 0 auto;
    }

    .tag {
      display: inline-block;
      margin-top: 32px;
      background: #F3F4F6;
      color: #366cd6;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="emoji">😉</span>
    <h1>Ah, tu as cliqué !</h1>
    <p>C'était un test de sensibilisation à la cybersécurité.<br>La prochaine fois, vérifie bien l'expéditeur avant de cliquer !</p>
    <span class="tag">Test interne — Temenis Conseil</span>
  </div>
</body>
</html>
